<div id="chat-container" class="chat-window shadow-lg border-0 animate-slide-up d-none">
    <div class="chat-header d-flex justify-content-between align-items-center p-3">
        <h6 class="mb-0 fw-bold"><i class="bi bi-chat-dots-fill me-2 text-white"></i>Chat</h6>
        <div class="chat-actions">
            <button class="btn btn-sm btn-link text-white p-0 me-2 opacity-75 hover-opacity-100" id="chat-btn-minimize" title="Minimizar">
                <i class="bi bi-dash-lg"></i>
            </button>
            <button class="btn btn-sm btn-link text-white p-0 opacity-75 hover-opacity-100" id="chat-btn-close" title="Cerrar">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
    </div>
    
    <div class="d-flex flex-grow-1 overflow-hidden" style="height: calc(100% - 48px);">
        <!-- Sidebar de usuarios -->
        <div class="chat-sidebar bg-light border-end border-light" style="width: 140px; flex-shrink: 0; overflow-y: auto;">
            <div id="chat-user-list" class="list-group list-group-flush small border-0">
                <!-- Usuarios cargados por JS -->
            </div>
        </div>

        <!-- Área principal -->
        <div class="d-flex flex-column flex-grow-1" style="width: calc(100% - 140px);">
            <div class="chat-expiration-notice px-2 py-1 text-center border-bottom border-light">
                <span id="chat-current-recipient-label" class="fw-bold px-2 py-1 rounded bg-white shadow-sm d-inline-block mt-1 mb-1" style="font-size: 0.75rem;"><i class="bi bi-globe me-1 text-primary"></i>Chat Global</span>
                <div class="d-flex align-items-center justify-content-center gap-2 mt-1 mb-1">
                    <div id="chat-expiration-text" class="small text-muted" style="font-size: 0.65rem;">Se borran en 30m</div>
                    <button id="chat-btn-delete-conversation" class="btn btn-link p-0 text-danger d-none" title="Borrar toda la conversación" onclick="chat.deleteConversation()">
                        <i class="bi bi-trash-fill" style="font-size: 0.75rem;"></i>
                    </button>
                </div>
            </div>
            
            <div class="chat-body p-3 flex-grow-1" id="chat-messages-list">
                <div class="text-center text-secondary small my-4 opacity-50 italic">
                    Cargando historial...
                </div>
            </div>
            
            <div class="chat-footer p-2 border-top border-light bg-white mt-auto">
                <form id="chat-form" class="d-flex gap-2">
                    <input type="text" id="chat-input" class="form-control form-control-sm border-0 bg-light px-3 rounded-pill" 
                        placeholder="Mensaje..." autocomplete="off">
                    <button type="submit" class="btn btn-primary btn-sm rounded-circle shadow-sm p-0 d-flex align-items-center justify-content-center flex-shrink-0" style="width: 32px; height: 32px;">
                        <i class="bi bi-send-fill" style="font-size: 0.8rem;"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Botón flotante de chat -->
<button id="chat-mute-btn" class="btn btn-light rounded-circle shadow-sm d-none animate-fade-in" title="Silenciar notificaciones" style="position: fixed; bottom: 35px; right: 95px; width: 40px; height: 40px; padding: 0; z-index: 99998; display: flex; align-items: center; justify-content: center; opacity: 0.8; transition: all 0.2s;">
    <i class="bi bi-volume-up-fill text-secondary"></i>
</button>
<button id="chat-toggle-btn" class="chat-toggle-btn shadow-lg animate-fade-in d-none">
    <i class="bi bi-chat-fill"></i>
    <span id="chat-badge" class="badge rounded-pill bg-danger d-none">0</span>
</button>
