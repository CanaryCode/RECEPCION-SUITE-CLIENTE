<div class="d-none d-print-block report-header-print">
    <div class="report-info-left">
        <h2>Reporte de Estancia</h2>
        <p>Hotel Garoé • Recepción</p>
    </div>
    <div class="report-info-right">
        <div><strong>Fecha:</strong> <span id="print-date-estancia"></span></div>
        <div><strong>Generado por:</strong> <span id="print-repc-nombre-estancia"></span></div>
        <div class="text-muted" style="font-size: 7pt; margin-top: 5px;">Documento Interno de Uso Operativo</div>
    </div>
</div>

<h4 class="module-title-discrete"><i class="bi bi-bar-chart-line-fill"></i>Control de Estancia</h4>

<div class="module-toolbar no-print">
    <!-- Botones de Vista -->
    <div class="btn-group" role="group">
        <button type="button" class="btn btn-outline-primary active" id="btnVistaTrabajoEstancia"
            onclick="cambiarVistaEstancia('trabajo')" data-bs-toggle="tooltip" data-bs-title="Vista de Trabajo">
            <i class="bi bi-pencil-square me-2"></i>Trabajo
        </button>
        <button type="button" class="btn btn-outline-primary" id="btnVistaGraficasEstancia"
            onclick="cambiarVistaEstancia('graficas')" data-bs-toggle="tooltip" data-bs-title="Vista de Gráficas">
            <i class="bi bi-graph-up me-2"></i>Gráficas
        </button>
    </div>

    <!-- Selectores de Periodo (Sólo visibles en Gráficas) -->
    <div id="periodSelectors" class="d-none align-items-center gap-3">
        <div class="d-flex align-items-center gap-2">
            <span class="small fw-bold text-primary">Reporte:</span>
            <select id="filtroTipoReporte" class="form-select form-select-sm fw-bold border-primary border-opacity-25" style="width: 140px;">
                <option value="mes">Mensual</option>
                <option value="año">Anual</option>
                <option value="5años">Últimos 5 Años</option>
            </select>
        </div>

        <div id="monthSelectorContainer" class="d-flex align-items-center gap-2">
            <span class="small fw-bold text-primary">Mes:</span>
            <select id="filtroMonthEstancia" class="form-select form-select-sm fw-bold border-primary border-opacity-25" style="width: 130px;">
                <option value="0">Enero</option>
                <option value="1">Febrero</option>
                <option value="2">Marzo</option>
                <option value="3">Abril</option>
                <option value="4">Mayo</option>
                <option value="5">Junio</option>
                <option value="6">Julio</option>
                <option value="7">Agosto</option>
                <option value="8">Septiembre</option>
                <option value="9">Octubre</option>
                <option value="10">Noviembre</option>
                <option value="11">Diciembre</option>
            </select>
        </div>
        
        <div id="yearSelectorContainer" class="d-flex align-items-center gap-2">
            <span class="small fw-bold text-primary">Año:</span>
            <select id="filtroYearEstancia" class="form-select form-select-sm fw-bold border-primary border-opacity-25" style="width: 90px;">
                <!-- Dinámico -->
            </select>
        </div>
    </div>

    <div class="ms-auto d-flex gap-2">
        <button class="btn btn-primary btn-sm fw-bold px-3" onclick="imprimirEstancia()">
            <i class="bi bi-printer me-1"></i>Imprimir Listado
        </button>
    </div>
</div>

<!-- VISTA DE TRABAJO -->
<div id="estancia-trabajo">
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <div class="py-2 mb-3 border-bottom d-flex align-items-center">
                <h6 class="mb-0 fw-bold text-primary"><i class="bi bi-plus-circle me-2"></i>Registrar Ocupación Diaria</h6>
            </div>
            <form id="formEstancia" class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label small fw-bold text-muted">Fecha Registro</label>
                    <div class="input-group input-group-sm">
                        <input type="date" id="estancia_fecha" class="form-control fw-bold" required readonly>
                        <button class="btn btn-outline-secondary" type="button" id="btnToggleLockFecha">
                            <i class="bi bi-lock-fill" id="iconLockFecha"></i>
                        </button>
                    </div>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold text-muted">Hab. Ocupadas</label>
                    <input type="number" id="estancia_ocupadas" class="form-control form-control-sm fw-bold" min="0" max="190" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-bold text-muted">Total Hotel</label>
                    <input type="text" id="estancia_total_ref" class="form-control form-control-sm bg-light fw-bold" value="190" readonly>
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-primary btn-sm w-100 fw-bold"><i class="bi bi-save-fill me-2"></i>Guardar Registro</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <div class="py-2 mb-3 border-bottom d-flex justify-content-between align-items-center">
                <h6 class="mb-0 fw-bold text-primary"><i class="bi bi-table me-2"></i>Listado Diario</h6>
                <button class="btn btn-sm btn-link text-success fw-bold p-0 text-decoration-none" onclick="exportarEstanciaExcel()">
                    <i class="bi bi-file-earmark-spreadsheet me-1"></i>Exportar Excel
                </button>
            </div>
            <div class="table-responsive">
                <table id="table-estancia" class="table table-sm table-hover align-middle mb-0 text-center">
                    <thead class="bg-light">
                        <tr class="small text-uppercase text-muted">
                            <th data-sort="d" class="ps-4 text-start">Día</th>
                            <th data-sort="ocupadas">Ocupadas</th>
                            <th data-sort="vacias">Vacías/Bloq.</th>
                            <th data-sort="libres">Libres</th>
                            <th data-sort="porcentaje">% Ocupación</th>
                            <th class="text-end pe-4">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaEstanciaCuerpo"></tbody>
                    <tfoot class="fw-bold" id="tablaEstanciaPie"></tfoot>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- VISTA DE GRÁFICAS -->
<div id="estancia-graficas" class="d-none">
    <div class="row g-4">
        <div class="col-md-8">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body">
                    <div class="py-2 mb-3 border-bottom">
                        <h6 class="mb-0 fw-bold text-primary" id="grafica-estancia-titulo">Evolución de Ocupación (%)</h6>
                    </div>
                    <div style="height: 400px;"><canvas id="chartEstanciaEvolucion"></canvas></div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body">
                    <div class="py-2 mb-3 border-bottom">
                        <h6 class="mb-0 fw-bold text-primary"><i class="bi bi-calculator me-2"></i>Resumen Estadístico</h6>
                    </div>
                    <div id="estancia_anual_stats">
                        <!-- Inyectado por JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
