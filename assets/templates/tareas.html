<div class="d-none report-header-print">
    <div class="report-info-left">
        <h2>Listado de Tareas</h2>
        <p>Hotel Garoé • Recepción</p>
    </div>
    <div class="report-info-right">
        <div><strong>Fecha:</strong> <span id="print-date-tareas"></span></div>
        <div><strong>Generado por:</strong> <span id="print-repc-nombre-tareas"></span></div>
    </div>
</div>

<h4 class="module-title-discrete"><i class="bi bi-check2-square text-primary me-2"></i>Gestión de Tareas</h4>

<div class="module-toolbar no-print">
    <div class="btn-group" role="group">
        <button type="button" class="btn btn-outline-primary active" id="btnVistaTrabajoTareas"
            data-bs-toggle="tooltip" data-bs-title="Formulario y Lista">
            <i class="bi bi-pencil-square me-2"></i>Edición
        </button>
        <button type="button" class="btn btn-outline-primary" id="btnVistaSoloTareas"
            data-bs-toggle="tooltip" data-bs-title="Solo Listado de Tareas">
            <i class="bi bi-list-ul me-2"></i>Listado
        </button>
    </div>

    <div class="btn-print-wrapper">
        <button class="btn btn-primary btn-sm fw-bold" onclick="imprimirTareas()"
            data-bs-toggle="tooltip" data-bs-title="Imprimir Listado">
            <i class="bi bi-printer me-1"></i>Imprimir
        </button>
    </div>
</div>

<div id="tareas-formulario">
    <div class="card mb-4 shadow-sm border-0">
        <div class="card-header py-3">
            <h6 class="sub-title-dynamic mb-0"><i class="bi bi-plus-circle me-2"></i>Nueva Tarea / Asignación</h6>
        </div>
        <div class="card-body">
            <form id="formTarea" class="row g-2">
                <input type="hidden" id="tarea_id">
                
                <div class="col-md-8">
                    <label class="form-label small fw-bold">Título de la Tarea</label>
                    <input type="text" id="tarea_titulo" class="form-control form-control-sm" 
                        placeholder="Ej: Revisar stock de folletos..." required
                        data-bs-toggle="tooltip" data-bs-title="Breve título descriptivo">
                </div>
                
                <div class="col-md-2">
                    <label class="form-label small fw-bold">Prioridad</label>
                    <select id="tarea_prioridad" class="form-select form-select-sm">
                        <option value="Normal">Normal</option>
                        <option value="Alta">🔴 Alta</option>
                        <option value="Baja">🟢 Baja</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label class="form-label small fw-bold">Fecha Límite</label>
                    <input type="date" id="tarea_fecha" class="form-control form-control-sm" required>
                </div>

                <div class="col-md-12">
                    <label class="form-label small fw-bold mb-1">Descripción / Detalles</label>
                    <textarea id="tarea_descripcion" class="form-control form-control-sm" rows="2"
                        placeholder="Detalles adicionales sobre la tarea..."
                        data-bs-toggle="tooltip" data-bs-title="Detalle completo de la tarea"></textarea>
                </div>

                <div class="col-12 d-flex justify-content-end align-items-center gap-2 mt-2">
                    <button type="button" class="btn btn-sm btn-outline-danger border-0" onclick="limpiarTareasTerminadas()"
                        data-bs-toggle="tooltip" data-bs-title="Archivar Tareas Resueltas">
                        <i class="bi bi-trash me-1"></i>Limpiar Terminadas
                    </button>
                    <button type="submit" id="btnSubmitTarea" class="btn btn-primary btn-sm px-4 fw-bold shadow-sm">
                        <i class="bi bi-save-fill me-2"></i>Guardar Tarea
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="card shadow-sm border-0">
    <div class="card-header py-3">
        <h6 class="mb-0 fw-bold">Listado de Tareas Activas</h6>
    </div>
    <div class="table-responsive">
        <table id="table-tareas" class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th style="width: 120px;" data-sort="fecha">Fecha Límite</th>
                    <th style="width: 100px;" data-sort="prioridad">Prioridad</th>
                    <th data-sort="titulo">Tarea / Descripción</th>
                    <th style="width: 150px;" data-sort="estado">Estado</th>
                    <th style="width: 100px;" class="text-end">Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaTareasCuerpo"></tbody>
        </table>
    </div>
</div>

<style>
    .tarea-alta {
        border-left: 4px solid #dc3545 !important;
        background-color: rgba(220, 53, 69, 0.02);
    }
    
    .tarea-terminada {
        opacity: 0.6;
    }

    .tarea-terminada .fw-bold {
        text-decoration: line-through;
    }
</style>
