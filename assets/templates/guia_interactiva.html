<div class="container-fluid py-4 animate__animated animate__fadeIn">
    <!-- Título Estándar -->
    <h4 class="module-title-discrete"><i class="bi bi-mortarboard-fill"></i>Guía de Uso Interactiva</h4>

    <!-- Barra de Herramientas Estándar (Sin fondo blanco para este módulo) -->
    <div class="module-toolbar no-print bg-transparent border-0 shadow-none px-0">
        <!-- Buscador integrado -->
        <div class="d-flex align-items-center flex-grow-1" style="max-width: 400px;">
            <div class="input-group input-group-sm shadow-sm rounded-pill overflow-hidden border">
                <span class="input-group-text bg-white border-0"><i class="bi bi-search text-primary"></i></span>
                <input type="text" id="guiaSearch" class="form-control border-0" placeholder="Buscar módulo...">
            </div>
        </div>

        <!-- Filtros de Categoría y Botón Imprimir -->
        <div class="d-flex align-items-center gap-3 ms-auto">
            <div class="btn-group btn-group-sm shadow-sm" id="guiaCategories" style="background: white; padding: 2px; border-radius: 10px;">
                <button class="btn btn-outline-primary active" data-category="shortcuts" data-bs-toggle="tooltip" title="Accesos Rápidos">
                    <i class="bi bi-lightning-charge"></i>
                </button>
                <button class="btn btn-outline-primary" data-category="services" data-bs-toggle="tooltip" title="Servicios">
                    <i class="bi bi-person-walking"></i>
                </button>
                <button class="btn btn-outline-primary" data-category="gestion" data-bs-toggle="tooltip" title="Gestión">
                    <i class="bi bi-journal-text"></i>
                </button>
                <button class="btn btn-outline-primary" data-category="admin" data-bs-toggle="tooltip" title="Administración">
                    <i class="bi bi-cash-stack"></i>
                </button>
                <button class="btn btn-outline-primary" data-category="consultas" data-bs-toggle="tooltip" title="Consultas">
                    <i class="bi bi-search-heart"></i>
                </button>
                <button class="btn btn-outline-primary" data-category="sistema" data-bs-toggle="tooltip" title="Sistema">
                    <i class="bi bi-hdd-network"></i>
                </button>
                <button class="btn btn-outline-primary" data-category="utilidades" data-bs-toggle="tooltip" title="Utilidades">
                    <i class="bi bi-tools"></i>
                </button>
            </div>

            <div class="btn-print-wrapper">
                <button class="btn btn-primary btn-sm fw-bold shadow-sm" onclick="window.GuiaInteractiva.imprimir()" data-bs-toggle="tooltip" title="Imprimir Guía">
                    <i class="bi bi-printer me-2"></i>Imprimir
                </button>
            </div>
        </div>
    </div>

    <!-- Listado de Módulos (Grid Dinámico) -->
    <div class="row g-4" id="guiaGrid">
        <!-- Se llena vía JS -->
    </div>
</div>

<!-- Modal de Detalles de la Guía -->
<div class="modal fade" id="modalGuiaDetalle" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg help-detail-modal">
            <div class="modal-header border-0 pb-0 pe-4">
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 pt-0" id="guiaDetalleContent">
                <!-- Se llena vía JS -->
            </div>
            <div class="modal-footer border-0 pt-0 pb-4 justify-content-center">
                <button type="button" class="btn btn-outline-secondary px-5 rounded-pill" data-bs-dismiss="modal">Entendido</button>
            </div>
        </div>
    </div>
</div>
