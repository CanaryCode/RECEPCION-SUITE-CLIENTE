<div class="d-none d-print-block report-header-print">
    <div class="report-info-left">
        <h2>Pronóstico del Tiempo</h2>
        <p>Hotel Garoé • Recepción</p>
    </div>
    <div class="report-info-right">
        <div><strong>Fecha:</strong> <span id="print-date-tiempo"></span></div>
        <div class="text-muted" style="font-size: 7pt; margin-top: 5px;">Documento Informativo - Santa Cruz de Tenerife
        </div>
    </div>
</div>

<h4 class="module-title-discrete"><i class="bi bi-cloud-sun"></i>El Tiempo</h4>

<div class="module-toolbar no-print">
    <div class="btn-group" role="group">
        <button type="button" class="btn btn-outline-primary active" id="btnVistaTrabajoTiempo">
            <i class="bi bi-display me-2"></i>Vista PDF
        </button>
    </div>

    <div class="btn-print-wrapper">
        <button class="btn btn-outline-secondary btn-sm fw-bold me-2" onclick="window.actualizarTiempo()">
            <i class="bi bi-arrow-clockwise me-2"></i>Actualizar
        </button>
        <button class="btn btn-primary btn-sm fw-bold" onclick="window.imprimirTiempo()">
            <i class="bi bi-printer me-2"></i>Imprimir Tiempo
        </button>
    </div>
</div>

<div id="tiempo-content-wrapper" class="content-panel animate-fade-in">
    <div class="card shadow-sm border-0 h-100">
        <div class="card-body p-0" style="min-height: 700px;">
            <iframe id="iframe-tiempo" src="https://www.eltiempo.es/pdf/santa-cruz-de-tenerife.pdf"
                style="width: 100%; height: 800px; border: none; border-radius: 8px;"
                title="El Tiempo en Santa Cruz de Tenerife">
            </iframe>
            <div id="tiempo-fallback" class="d-none text-center p-5">
                <i class="bi bi-exclamation-triangle fs-1 text-warning mb-3"></i>
                <p>No se pudo cargar el PDF directamente desde eltiempo.es.</p>
                <a href="https://www.eltiempo.es/pdf/santa-cruz-de-tenerife.pdf" target="_blank"
                    class="btn btn-primary">
                    Abrir en nueva pestaña
                </a>
            </div>
        </div>
    </div>
</div>
